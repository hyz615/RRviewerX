<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RRviewer - 工作台</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('rr_theme');
          if (!saved) {
            saved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', saved);
        } catch (e) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/styles.css?v=20260407" />
    <script>window.I18N_NO_FLOAT = true;</script>
    <script src="assets/i18n.js?v=20260407" defer></script>
    <script src="assets/api.js" defer></script>
    <script src="assets/toast.js" defer></script>
    <script src="assets/app-shell.js?v=20260407" defer></script>
    <script src="assets/app-state.js?v=20260407" defer></script>
    <script src="assets/page-workspace.js?v=20260407" defer></script>
  </head>
  <body class="page-surface">
    <div id="app-shell-top"></div>
    <main class="page-wrap">
      <section class="page-hero" style="padding-bottom:1.5rem;">
        <div class="page-hero__copy">
          <div class="page-kicker">RRviewerX</div>
          <h1 class="page-title" data-i18n="my_courses">我的课程</h1>
        </div>
        <div class="page-hero__actions">
          <button id="btn-new-course" type="button" class="primary-btn" data-i18n="new_course">＋ 新建课程</button>
        </div>
      </section>

      <div id="course-grid" class="course-grid"></div>
      <div id="course-grid-empty" class="empty-state hidden" style="padding:2rem 0;" data-i18n="course_no_courses_yet">
        还没有课程，点击「＋ 新建课程」开始。
      </div>
    </main>

    <!-- New course dialog -->
    <dialog id="new-course-dialog" class="new-course-dialog">
      <h2 class="text-lg font-semibold mb-4" data-i18n="new_course_dialog_title">新建课程</h2>
      <div class="field-stack mb-3">
        <label class="field-label" data-i18n="new_course_subject_label">科目</label>
        <select id="dialog-subject" class="select-field mt-1"></select>
      </div>
      <div class="field-stack mb-4">
        <label class="field-label" data-i18n="new_course_name_label">课程名</label>
        <input id="dialog-course-name" class="input-field mt-1" type="text"
          data-i18n-placeholder="subject_course_placeholder" placeholder="例如：高等数学上" />
      </div>
      <div class="toolbar-row" style="justify-content:flex-end; gap:0.5rem;">
        <button id="btn-dialog-cancel" type="button" class="ghost-btn" data-i18n="new_course_cancel">取消</button>
        <button id="btn-dialog-confirm" type="button" class="primary-btn" data-i18n="new_course_confirm">创建并进入</button>
      </div>
    </dialog>

    <div id="app-shell-bottom"></div>
  </body>
</html>
