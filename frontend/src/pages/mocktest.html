<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RRviewer - 模拟测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/styles.css?v=20250912" />
    <script>window.I18N_NO_FLOAT = true;</script>
    <script src="assets/i18n.js?v=20250920" defer></script>
    <script src="assets/api.js" defer></script>
    <script src="assets/toast.js" defer></script>
  </head>
  <body class="bg-slate-50">
    <div class="max-w-5xl mx-auto p-6">
      <div class="flex items-center justify-between mb-4">
        <h1 class="text-xl font-semibold" data-i18n="mock_test">模拟测试</h1>
        <a href="workspace.html" class="text-xs underline text-slate-600">← Back</a>
      </div>
      <div id="loading" class="text-sm text-slate-600 mb-3"><span class="spinner inline-block mr-2"></span><span data-i18n="mock_loading">正在生成测试…</span></div>
      <div id="test-box" class="hidden">
        <div id="meta" class="text-xs text-slate-500 mb-2"></div>
        <div id="q-list" class="flex flex-col gap-4"></div>
        <div class="mt-4 flex items-center gap-3">
          <button id="btn-submit" class="bg-emerald-600 text-white px-4 py-2 rounded text-sm" data-i18n="mock_submit">提交评分</button>
          <div id="score" class="text-sm text-slate-700"></div>
        </div>
      </div>
      <div id="empty" class="hidden text-sm text-slate-600" data-i18n="mock_empty">暂无复习单内容，无法生成测试</div>
    </div>

  <script>
      function authHeaders(base={}){ const h = {...base}; const t = localStorage.getItem('token'); if(t) h['Authorization'] = 'Bearer '+t; return h; }
      function qs(name){ const u=new URLSearchParams(location.search); return u.get(name)||''; }
      function t(k){ return window.__i18n__?__i18n__.t(k):k; }

      const lang = qs('lang') || 'zh';
      const length = qs('length') || 'short';

      async function loadTest(){
  // Always prefer current on-screen review sheet passed via sessionStorage
  let text = '';
  try{ text = sessionStorage.getItem('review_text') || ''; }catch(_){ }
  if(!(text||'').trim()){ document.getElementById('loading').classList.add('hidden'); document.getElementById('empty').classList.remove('hidden'); return; }
  const body = { text, lang, length };
        try{
          const r = await apiFetch('/test/generate', { method:'POST', headers: { ...authHeaders({ 'Content-Type':'application/json' }) }, body: JSON.stringify(body) });
          const j = await r.json();
          document.getElementById('loading').classList.add('hidden');
          if(!(j && j.ok)) { document.getElementById('empty').classList.remove('hidden'); return; }
          renderTest(j.items, j.meta||{});
        }catch(e){ document.getElementById('loading').classList.add('hidden'); document.getElementById('empty').classList.remove('hidden'); }
      }

      function renderTest(items, meta){
        const box = document.getElementById('test-box'); box.classList.remove('hidden');
        const m = document.getElementById('meta');
        try{ m.textContent = `Target ${meta.target_total||items.length}; Types: ${JSON.stringify(meta.target_types||{})}`; }catch(_){ }
        const list = document.getElementById('q-list'); list.innerHTML='';
        window.__mockItems = items;
        items.forEach((q, idx)=>{
          const wrap = document.createElement('div');
          wrap.className = 'p-3 bg-white rounded border';
          const tag = q.type==='single'? t('mock_type_single') : q.type==='tf'? t('mock_type_tf') : t('mock_type_short');
          const diff = q.difficulty || 'medium';
          const head = document.createElement('div'); head.className='text-sm mb-2'; head.innerHTML = `<span class="inline-block px-2 py-0.5 text-[11px] rounded bg-slate-100 text-slate-700 mr-2">${tag}</span><span class="inline-block px-2 py-0.5 text-[11px] rounded bg-slate-100 text-slate-700">${diff}</span>`;
          const stem = document.createElement('div'); stem.className='font-medium mb-2'; stem.textContent = `${idx+1}. ${q.stem}`;
          wrap.appendChild(head); wrap.appendChild(stem);
          if(q.type==='single'){
            const ul = document.createElement('div'); ul.className='flex flex-col gap-1';
            (q.choices||[]).forEach((ch,i)=>{
              const id = `q_${q.id}_opt_${i}`;
              const row = document.createElement('label'); row.className='flex items-center gap-2 text-sm';
              row.innerHTML = `<input type="radio" name="q_${q.id}" value="${i}" class="scale-90"> <span>${String.fromCharCode(65+i)}. ${ch}</span>`;
              ul.appendChild(row);
            }); wrap.appendChild(ul);
          } else if(q.type==='tf'){
            const g = document.createElement('div'); g.className='flex items-center gap-4 text-sm';
            g.innerHTML = `<label class="flex items-center gap-1"><input type="radio" name="q_${q.id}" value="true" class="scale-90"> ${lang.startsWith('en')?'True':'正确'}</label>
                           <label class="flex items-center gap-1"><input type="radio" name="q_${q.id}" value="false" class="scale-90"> ${lang.startsWith('en')?'False':'错误'}</label>`;
            wrap.appendChild(g);
          } else {
            const ta = document.createElement('textarea'); ta.className='w-full border rounded p-2 text-sm'; ta.rows=3; ta.name = `q_${q.id}`; wrap.appendChild(ta);
          }
          const exp = document.createElement('div'); exp.className='mt-2 text-xs text-slate-600 hidden'; exp.dataset.role='explain';
          exp.innerHTML = `<span class="font-semibold">${t('mock_reference')}:</span> <span>${(q.type==='single')? (q.choices[q.answer]||'') : (q.type==='tf'? (q.answer? (lang.startsWith('en')?'True':'正确'):(lang.startsWith('en')?'False':'错误')) : (q.answer||''))}</span><div>${q.explanation||''}</div>`;
          wrap.appendChild(exp);
          list.appendChild(wrap);
        });
        document.getElementById('btn-submit').onclick = ()=> score(items);
      }

      async function score(items){
        const answers = {};
        items.forEach(q=>{
          if(q.type==='single' || q.type==='tf'){
            const sel = document.querySelector(`input[name=\"q_${q.id}\"]:checked`);
            answers[q.id] = sel ? sel.value : '';
          } else {
            const ta = document.querySelector(`textarea[name=\"q_${q.id}\"]`);
            answers[q.id] = (ta && ta.value) ? ta.value.trim() : '';
          }
        });
        const review = (sessionStorage.getItem('review_text')||'').toString();
        const body = { items, answers, lang, review_text: review };
        try{
          const r = await apiFetch('/test/score', { method:'POST', headers:{ 'Content-Type':'application/json', ...authHeaders() }, body: JSON.stringify(body) });
          const j = await r.json();
          if(!(j && j.ok)) throw new Error('score_failed');
          const res = j.results || [];
          const map = new Map(res.map(x=>[x.id, x]));
          let correct = 0;
          items.forEach(q=>{
            const row = document.querySelector(`textarea[name=\"q_${q.id}\"]`)?.closest('.border') || document.querySelector(`input[name=\"q_${q.id}\"]`)?.closest('.border');
            const exp = row ? row.querySelector('[data-role=\"explain\"]') : null;
            const rr = map.get(q.id);
            if(rr && rr.correct){ correct++; if(row){ row.classList.remove('border-red-300'); row.classList.add('border-emerald-300'); } }
            else if(row){ row.classList.remove('border-emerald-300'); row.classList.add('border-red-300'); }
            if(exp){
              exp.classList.remove('hidden');
              if(rr && rr.reason){
                const reasonEl = document.createElement('div'); reasonEl.className='mt-1 text-[11px] text-slate-500';
                reasonEl.textContent = rr.reason;
                exp.appendChild(reasonEl);
              }
            }
          });
          const s = document.getElementById('score');
          s.textContent = `${t('mock_score')}: ${correct}/${items.length}`;
        }catch(e){
          const s = document.getElementById('score'); s.textContent = 'score failed';
        }
      }

      document.addEventListener('DOMContentLoaded', loadTest);
    </script>
  </body>
</html>
