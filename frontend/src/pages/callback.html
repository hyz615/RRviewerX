<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RRviewer - 登录回调</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/styles.css?v=20250912" />
  <script src="assets/i18n.js?v=20260408" defer></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div class="fixed top-0 left-0 right-0 z-10 topbar" id="app-topbar">
      <div class="max-w-6xl mx-auto px-4 h-12 flex items-center justify-between">
  <a href="workspace.html" class="flex items-center"><img src="assets/logo.png" alt="RRviewer" class="brand-logo" /></a>
        <div class="text-xs text-slate-500">&nbsp;</div>
      </div>
    </div>
  <div class="topbar-spacer"></div>
    <div class="max-w-md mx-auto p-6 mt-10 rounded-xl rr-card">
  <h1 class="text-2xl font-bold mb-2 flex items-center"><img src="assets/logo.png" alt="RRviewer" class="brand-logo mr-2" /><span class="sr-only">RRviewer</span></h1>
      <p class="text-sm text-slate-600" data-i18n="finishing_login">正在完成登录，请稍候……</p>
    </div>
    <script>
      // elevate + auto hide topbar
      (function(){
        const tb=document.getElementById('app-topbar');
        let lastY = window.scrollY||window.pageYOffset;
        const onScroll=()=>{ 
          const y=Math.max(0, window.scrollY||window.pageYOffset); 
          tb.classList.toggle('topbar--elevated', y>4);
          const delta = y - lastY; const threshold = 6;
          if (y < 32) { tb.classList.remove('topbar--hidden'); lastY = y; return; }
          if (delta > threshold && y > 64) tb.classList.add('topbar--hidden');
          else if (delta < -threshold) tb.classList.remove('topbar--hidden');
          lastY = y;
        };
        onScroll(); window.addEventListener('scroll', onScroll, {passive:true});
      })();
      (function(){
        function getCookie(name){
          const m = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()\[\]\\\/\+^])/g, '\\$1') + '=([^;]*)'));
          return m ? decodeURIComponent(m[1]) : null;
        }
        function getHashToken(){
          try {
            const m = location.hash.match(/[#&]?token=([^&]+)/);
            return m ? decodeURIComponent(m[1]) : null;
          } catch(e){ return null; }
        }
        const token = getHashToken() || getCookie('rr_token');
        if (token) {
          try { localStorage.setItem('token', token); } catch(e) {}
          window.location.replace('workspace.html');
        } else {
          window.location.replace('index.html#oauth_error=missing_token');
        }
      })();
  </script>
  <footer class="mt-10 py-6 text-center text-xs text-slate-500">©RUR1 INNOVATION & Skyru AI</footer>
  </body>
  </html>
