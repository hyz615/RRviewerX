<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RRviewer - 对话</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('rr_theme');
          if (!saved) {
            saved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', saved);
        } catch (e) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/styles.css?v=20260407" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
    <script>window.I18N_NO_FLOAT = true;</script>
    <script src="assets/i18n.js?v=20260407" defer></script>
    <script src="assets/api.js" defer></script>
    <script src="assets/toast.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js" defer></script>
    <script src="assets/app-shell.js?v=20260407" defer></script>
    <script src="assets/app-state.js?v=20260407" defer></script>
    <script src="assets/page-chat.js?v=20260407" defer></script>
  </head>
  <body class="page-surface">
    <div id="app-shell-top"></div>
    <div id="course-header"></div>
    <main class="page-wrap">
      <div class="page-grid page-grid--chat">
        <section class="panel">
          <div class="panel-header">
            <div>
              <h2 class="panel-title" data-i18n="chat_current_review">当前提要</h2>
              <p class="panel-copy" data-i18n="chat_page_subtitle">围绕当前提要继续追问与展开。</p>
            </div>
            <div class="toolbar-row">
              <a href="review.html" class="ghost-btn" data-i18n="chat_open_review">去生成页</a>
              <a href="history.html" class="ghost-btn" data-i18n="chat_open_history">从历史恢复</a>
            </div>
          </div>
          <div id="chat-review-summary"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <h2 class="panel-title" data-i18n="ask_title">复习提要聊天</h2>
              <p class="panel-copy" data-i18n="chat_free">聊天不计费</p>
            </div>
            <button id="btn-clear-chat" type="button" class="ghost-btn" data-i18n="chat_clear">清空</button>
          </div>

          <div id="chat-empty" class="empty-state" data-i18n="chat_no_review">还没有当前提要，请先生成或从历史恢复。</div>
          <div id="chat-log" class="chat-log"></div>

          <textarea id="chat-question" class="text-area" data-i18n-placeholder="ask_placeholder" placeholder="输入问题..."></textarea>
          <div class="toolbar-row" style="margin-top:0.85rem; justify-content:space-between;">
            <span id="chat-status" class="muted-inline"></span>
            <button id="btn-send" type="button" class="primary-btn" data-i18n="chat_send">发送</button>
          </div>
        </section>
      </div>
    </main>
    <div id="app-shell-bottom"></div>
  </body>
</html>
