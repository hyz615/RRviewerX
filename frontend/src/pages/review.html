<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RRviewer - 复习提要</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('rr_theme');
          if (!saved) {
            saved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', saved);
        } catch (e) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/styles.css?v=20260409" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
    <script>window.I18N_NO_FLOAT = true;</script>
    <script src="assets/i18n.js?v=20260409" defer></script>
    <script src="assets/api.js" defer></script>
    <script src="assets/toast.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js" defer></script>
    <script src="assets/app-shell.js?v=20260409" defer></script>
    <script src="assets/app-state.js?v=20260409" defer></script>
    <script src="assets/page-review.js?v=20260409" defer></script>
  </head>
  <body class="page-surface">
    <div id="app-shell-top"></div>
    <div id="course-header"></div>
    <main class="page-wrap">

      <div class="page-grid page-grid--review">
        <section class="panel">
          <div id="review-action-dock" class="flow-dock">
            <div class="flow-dock__meta">
              <span id="review-summary-selected" class="flow-pill"></span>
              <span id="review-summary-draft" class="flow-pill"></span>
              <span id="review-summary-mode" class="flow-pill"></span>
            </div>
            <div id="review-summary-text" class="flow-dock__copy"></div>
            <div id="review-summary-preview" class="flow-dock__preview hidden"></div>
            <div class="toolbar-row" style="margin-top:0.85rem;">
              <a id="review-back-upload" href="upload.html" class="soft-btn" data-i18n="review_back_materials">返回改材料</a>
              <button id="btn-generate-top" type="button" class="primary-btn" data-i18n="generate_btn">生成</button>
            </div>
          </div>

          <div class="panel-header">
            <div>
              <h2 class="panel-title" data-i18n="review_sources_title">本次材料</h2>
              <p class="panel-copy" data-i18n="review_no_sources">尚未选择文件，将仅使用下方文本生成。</p>
            </div>
          </div>

          <div class="context-grid">
            <label class="field-stack">
              <span class="field-label" data-i18n="exam_label">考试类型</span>
              <select id="review-exam-type" class="select-field"></select>
            </label>
            <label class="field-stack">
              <span class="field-label" data-i18n="exam_name_label">考试名称</span>
              <input id="review-exam-name" class="input-field" type="text" data-i18n-placeholder="exam_name_placeholder" placeholder="例如：2026 春期中" />
            </label>
          </div>

          <div class="panel-header" style="margin-top:1rem; margin-bottom:0.75rem;">
            <div>
              <h2 class="panel-title" data-i18n="review_generation_mode_title">生成依据</h2>
              <p id="review-generation-mode-note" class="panel-copy" data-i18n="review_generation_mode_copy">选择本次生成使用当前材料、课程 textbook 或二者组合。</p>
            </div>
          </div>
          <div id="review-generation-mode-group" class="segmented-group" style="flex-wrap:wrap;">
            <button type="button" class="segmented-btn" data-generation-mode="materials" data-i18n="review_generation_mode_materials">仅当前材料</button>
            <button type="button" class="segmented-btn" data-generation-mode="textbook" data-i18n="review_generation_mode_textbook">仅 textbook</button>
            <button type="button" class="segmented-btn" data-generation-mode="combined" data-i18n="review_generation_mode_combined">textbook + 当前材料</button>
          </div>
          <div id="review-textbook-meta" class="helper-text" style="margin-top:0.65rem;"></div>

          <div id="review-chapter-section">
            <div class="panel-header" style="margin-top:1rem; margin-bottom:0.75rem;">
              <div>
                <h2 class="panel-title" data-i18n="review_chapter_scope_title">章节范围</h2>
                <p id="review-chapter-note" class="panel-copy" data-i18n="review_chapter_scope_copy">按单元分组选章节，生成时只会带入这些章节已映射的材料。</p>
              </div>
            </div>
            <div id="review-chapter-groups"></div>
            <div id="review-chapter-empty" class="empty-state hidden" data-i18n="review_chapter_scope_empty">当前课程还没有配置章节结构。</div>
          </div>

          <div id="review-sources" class="chip-list"></div>
          <div id="review-sources-empty" class="empty-state mt-4" data-i18n="review_no_sources">尚未选择文件，将仅使用下方文本生成。</div>

          <div class="toolbar-row" style="margin-top:1rem;">
            <select id="fmt" class="select-field">
              <option value="review_sheet_pro" data-i18n-option="format_review_pro">复习单 Pro</option>
              <option value="qa" data-i18n-option="format_qa">问答 Q&A</option>
              <option value="flashcards" data-i18n-option="format_flashcards">闪卡 Flashcards</option>
            </select>
            <div class="segmented-group" id="len-group">
              <button type="button" class="segmented-btn" data-length="short" data-i18n="length_short">短</button>
              <button type="button" class="segmented-btn" data-length="medium" data-i18n="length_medium">中</button>
              <button type="button" class="segmented-btn" data-length="long" data-i18n="length_long">长</button>
            </div>
          </div>

          <textarea id="src" class="text-area" data-i18n-placeholder="input_or_paste" placeholder="输入或粘贴文本..."></textarea>
          <div class="toolbar-row" style="margin-top:0.75rem; justify-content:space-between;">
            <span id="draft-status" class="muted-inline"></span>
            <span id="char-count" class="muted-inline">0</span>
          </div>

          <div class="toolbar-row" style="margin-top:1rem;">
            <button id="btn-generate" type="button" class="primary-btn" data-i18n="generate_btn">生成</button>
            <button id="btn-copy" type="button" class="soft-btn" data-i18n="copy_all">复制全文</button>
            <button id="btn-export-md" type="button" class="ghost-btn" data-i18n="export_md">导出 .md</button>
            <button id="btn-export-pdf" type="button" class="ghost-btn" data-i18n="export_pdf">导出 PDF</button>
            <a id="btn-mock-test" href="mocktest.html" class="ghost-btn hidden" data-i18n="mock_test">模拟测试</a>
          </div>

          <div id="gen-progress" class="progress-card hidden">
            <div class="progress-track">
              <div id="gen-progress-bar" class="progress-bar"></div>
            </div>
            <div id="gen-progress-text" class="helper-text" style="margin-top:0.65rem;" data-i18n="generating_long">正在生成… 可能需要 1–3 分钟</div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <h2 class="panel-title" data-i18n="review_current_output">当前结果</h2>
              <p id="review-meta" class="panel-copy"></p>
            </div>
            <div class="toolbar-row">
              <a id="review-open-chat" href="chat.html" class="ghost-btn" data-i18n="review_open_chat">去对话</a>
              <a id="review-open-history" href="history.html" class="ghost-btn" data-i18n="review_open_history">打开历史</a>
            </div>
          </div>
          <div id="review-empty" class="empty-state" data-i18n="review_empty_state">生成后，结构化结果会显示在这里。</div>
          <article id="review-output" class="result-frame prose prose-slate max-w-none hidden"></article>
        </section>
      </div>
    </main>
    <div id="app-shell-bottom"></div>
  </body>
</html>
